apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: poc-demo
  namespace: argocd
spec:
  description: POC Demo Project

  sourceRepos:
  - https://github.com/nimya2007/nginx-helm-chart.git

  destinations:
  - namespace: demo-*
    server: https://kubernetes.default.svc

  clusterResourceWhitelist:
  - group: '*'
    kind: '*'